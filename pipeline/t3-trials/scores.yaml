# T3 platform trials — public scoring (rubric in README.md)
# 1–5 per axis. Weighted total counts adherence and consistency double.
# Objective axes the steward may pre-fill: adherence, nativeness, friction.
# Taste axes only the founder fills: motion, look, consistency (R4: decisions
# are made on rendered material, and taste is the author's).
platforms:
