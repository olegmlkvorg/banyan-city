# Tree configuration — Sapling
# Amendable per Guideline 6. Null values are open decisions (see DECISIONS.md).

tree:
  id: sapling
  title: "Sapling"          # working title — open decision D6
  author: founder            # taste of record
  steward: author-agent      # delegated execution — see STEWARDSHIP.md
  taste_file: taste/sapling.founder.v0.2.md
  seeded: 2026-07-10
  framework: banyan-city    # a fork of this tree copies this whole genome directory

format:
  aspect_ratio: "9:16"
  episode_seconds_min: 60
  episode_seconds_max: 90
  cliffhanger_required: true   # taste rule R5

lifecycle:                     # Guideline 7 — resolved per D4 (2026-07-11), amendable per Guideline 6
  hot_duration_days: 45
  hardening_threshold: "leading leaf holds >=60% of node sap for 14 consecutive days, minimum 25 reactions"
  dormancy_season_days: 90

watering_split:                # Guideline 2 — resolved per D5 (2026-07-11): costs first, then 70/30
  policy: costs-first-70-30-v1 # each watered render reimburses its published generation cost first
  author_pct: 70               # ...then the remainder splits author/commons
  commons_pct: 30
  # requires founder confirmation before first real funds land (STEWARDSHIP.md #4)

watering_rail:                 # the two founder-only keys (STEWARDSHIP.md #4) — fill both, push, rail opens
  payment_link: null           # e.g. https://ko-fi.com/<founder> — created and owned by the founder
  confirmed_by_founder: false  # founder re-confirms the D5 split the moment real money can arrive
  # while payment_link is null the site shows watering as "opening soon" and
  # offers compute-watering (always live: WATERING.md, pipeline/kaggle/)
