  linework, minimal shading (single shadow tone), simplified shapes, soft watercolor-wash
  backgrounds with large empty areas, gentle pastel-leaning palette, expressive minimal
  faces. No photorealism, no 3D render look, no heavy texture. 9:16 vertical, no text.'
