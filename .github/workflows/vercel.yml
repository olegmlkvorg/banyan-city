# Deploys the built site to Vercel (banyan.city) on every push to main.
# Requires a VERCEL_TOKEN repository secret (work order V4 in OPERATOR.md);
# without it the job exits quietly and the Pages mirror still deploys.
name: vercel
on:
  push:
    branches: [main]
  workflow_dispatch:
concurrency:
  group: vercel
  cancel-in-progress: true
jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: team_a9sPzfYauUVeVMTAsO8hWXaH
      VERCEL_PROJECT_ID: prj_LfrxgwzJFYqW2OEa5TL63RePlmbD
    steps:
      - name: Check token configured
        id: check
        run: |
          if [ -n "$VERCEL_TOKEN" ]; then echo "ok=true" >> "$GITHUB_OUTPUT";
          else echo "VERCEL_TOKEN secret not set — skipping (see OPERATOR.md V4)"; fi
      - uses: actions/checkout@v4
        if: steps.check.outputs.ok == 'true'
      - uses: actions/setup-python@v5
        if: steps.check.outputs.ok == 'true'
        with:
          python-version: "3.12"
      - if: steps.check.outputs.ok == 'true'
        run: |
          pip install pyyaml markdown
          npx -y vercel pull --yes --environment=production --token "$VERCEL_TOKEN"
          npx -y vercel build --prod --token "$VERCEL_TOKEN"
          npx -y vercel deploy --prebuilt --prod --yes --token "$VERCEL_TOKEN"
