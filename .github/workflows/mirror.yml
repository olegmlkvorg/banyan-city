# Layer 1 resilience (PRD §7.1): auto-mirror the canonical layer to at
# least one independent host. Opt-in: set a MIRROR_GIT_URL repository
# secret containing a push-authenticated remote, e.g.
#   https://user:token@codeberg.org/user/repo.git
# Without the secret this workflow is a no-op.
name: mirror
on:
  push:
  workflow_dispatch:
jobs:
  mirror:
    runs-on: ubuntu-latest
    env:
      MIRROR_URL: ${{ secrets.MIRROR_GIT_URL }}
    steps:
      - name: Check mirror configured
        id: check
        run: |
          if [ -n "$MIRROR_URL" ]; then echo "configured=true" >> "$GITHUB_OUTPUT";
          else echo "MIRROR_GIT_URL secret not set — skipping (see workflow comments)"; fi
      - uses: actions/checkout@v4
        if: steps.check.outputs.configured == 'true'
        with:
          fetch-depth: 0
      - name: Push mirror
        if: steps.check.outputs.configured == 'true'
        run: git push --mirror "$MIRROR_URL"
