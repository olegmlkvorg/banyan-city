# Phase 1: the tree becomes visible. Builds _site/ from the genomes
# and deploys to GitHub Pages so a non-git citizen can read and react.
name: pages
on:
  push:
    branches: [main, master]   # prod only — WIP branches must not publish to the live mirror
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: true
jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pyyaml markdown
      - run: python pipeline/lint_genome.py
      - run: python pipeline/build_site.py
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
