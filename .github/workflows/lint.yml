# Transparency integrity (PRD §12): every push proves the tree is
# structurally honest — parents declared, R1/R5 sections present,
# leaf provenance complete, ledger well-formed.
name: lint-genome
on: [push, pull_request, workflow_dispatch]
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pyyaml pillow markdown
      - run: sudo apt-get update && sudo apt-get install -y fonts-dejavu-core
      - run: python pipeline/lint_genome.py
      - run: python pipeline/test_pipeline.py
