# Screening (PRD §7.2 step 2): citizens rate competing leaves.
# The crowd NARROWS; the taste file decides. Screening data doubles
# as pre-release sap and is open data per Guideline 4.
name: 🔍 Screen a leaf
description: Rate one rendered leaf of a node — continuity, character, vibe. Your rating narrows the shortlist; the taste file makes the final call.
title: "screening: <leaf-id>"
labels: [screening]
body:
  - type: input
    id: leaf
    attributes:
      label: Leaf ID
      description: "Which render are you rating? (e.g. 002b-t1-a — find it in the node's leaf table on the site or in genomes/*/nodes/*/leaves/)"
      placeholder: 002b-t1-a
    validations:
      required: true
  - type: dropdown
    id: continuity
    attributes:
      label: Continuity (1–5)
      description: Does it follow coherently from its parent node?
      options: ["5 — seamless", "4", "3", "2", "1 — breaks the story"]
    validations:
      required: true
  - type: dropdown
    id: character
    attributes:
      label: Character consistency (1–5)
      description: Do the characters feel like themselves?
      options: ["5 — exactly them", "4", "3", "2", "1 — who is this?"]
    validations:
      required: true
  - type: dropdown
    id: vibe
    attributes:
      label: Vibe (1–5)
      description: The felt sense — would you keep watching?
      options: ["5 — I live there", "4", "3", "2", "1 — nothing"]
    validations:
      required: true
  - type: textarea
    id: note
    attributes:
      label: The wince (optional)
      description: Any specific moment that landed or broke? Quote the beat. Moments, not whole candidates (R6).
    validations:
      required: false
