# The no-git branching path: paste your story, the steward handles the plumbing.
# Submissions become real branches (PRs crediting you) on the next tending pass.
name: 🌿 Submit a branch (no git knowledge needed)
description: Continue any episode your way. Paste your story here — the steward turns it into a real branch in the tree, credited to you.
title: "branch: <your title>"
labels: [branch-submission]
body:
  - type: input
    id: parent
    attributes:
      label: Parent node
      description: "Which episode does yours continue? (its ID — e.g. 002c, 003a, 004 — from the site or lineage.yaml)"
      placeholder: "002c"
    validations:
      required: true
  - type: input
    id: title
    attributes:
      label: Your episode's title
      placeholder: "The Second Sunset"
    validations:
      required: true
  - type: textarea
    id: story
    attributes:
      label: The story
      description: "Your episode — script, beats, or prose. Two things every node needs: something must CHANGE (world, relationship, or knowledge — R1), and it must end on a real hook (R5). 60–90s of screen time ≈ 300–500 words. Any format; the steward will fit it to the node template without altering your content."
    validations:
      required: true
  - type: input
    id: credit
    attributes:
      label: How to credit you
      description: "Name/handle for the leaf metadata (authorship is permanent and public)"
      placeholder: "@yourhandle"
    validations:
      required: true
  - type: checkboxes
    id: license
    attributes:
      label: License
      options:
        - label: I release this contribution under CC BY 4.0, same as all story content here (attribution = your credit above, forever)
          required: true
  - type: markdown
    attributes:
      value: |
        **What happens next:** on the next tending pass the steward lints your story against the two structural rules (R1 state change, R5 hook), files it as a real branch in `genomes/` with your credit in the leaf metadata, and opens its reaction thread. Branches are never rejected for *direction* — only returned for missing structure, with notes. Your branch can contradict canon freely (Guideline 1).
